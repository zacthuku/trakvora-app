services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trakvora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trakvora}
      POSTGRES_DB: ${POSTGRES_DB:-trakvora}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trakvora} -d ${POSTGRES_DB:-trakvora}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-trakvora}:${POSTGRES_PASSWORD:-trakvora}@db:5432/${POSTGRES_DB:-trakvora}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FLUTTERWAVE_WEBHOOK_SECRET: ${FLUTTERWAVE_WEBHOOK_SECRET:-}
      FLUTTERWAVE_TRANSFER_CALLBACK_URL: ${FLUTTERWAVE_TRANSFER_CALLBACK_URL:-}
      FLUTTERWAVE_REDIRECT_URL: ${FLUTTERWAVE_REDIRECT_URL:-}
      SMILE_IDENTITY_API_KEY: ${SMILE_IDENTITY_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SUPPORT_WHATSAPP: ${SUPPORT_WHATSAPP:-+254700000000}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@trakvora.com}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_SUPPORT_WHATSAPP: ${SUPPORT_WHATSAPP:-+254700000000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
