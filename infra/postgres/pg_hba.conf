# pg_hba.conf — Production PostgreSQL access control for Trakvora.
# Replace BACKEND_SERVER_IP with the actual backend server IP before deploying.
#
# TYPE  DATABASE    USER        ADDRESS                   METHOD
local   all         postgres                              peer
local   all         all                                   peer
# Backend server — only this IP may connect to the trakvora database
host    trakvora    trakvora    BACKEND_SERVER_IP/32      scram-sha-256
# Allow localhost connections for maintenance
host    all         all         127.0.0.1/32              scram-sha-256
host    all         all         ::1/128                   scram-sha-256
